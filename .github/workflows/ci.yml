name: CI

# Lint + unit tests + secret scan run on stock ubuntu with no Wine, no broker
# pack, and no secrets. The Wine/amd64 image build is intentionally out of scope
# here (deferred to the release pipeline, feature 011).

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & unit tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: appliance/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test tooling
# ruff is pinned for reproducibility (lint/format rules change between versions).
        run: python -m pip install --upgrade pip "ruff==0.13.2" pytest
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Unit tests
        run: pytest -m 'not integration'

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  go-cli:
    name: Test & build qmtctl
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/qmtctl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/qmtctl/go.mod
      - name: go test, vet & build
        run: |
          go test ./...
          go vet ./...
          go build ./...
