name: Release

# Publishes the broker-neutral amd64 base image to GHCR and (on a version tag)
# creates a GitHub Release. The image contains NO QMT terminal / xtquant / broker
# data — those are supplied at runtime as a mounted broker pack — so publishing it
# publicly is safe. amd64-only by design (Apple Silicon is emulation-only).
#
# Build policy (keep image builds deliberate & infrequent):
#   - The heavy Wine image is NEVER built on push/PR (that is ci.yml's job, which
#     only lints + unit-tests — it does not touch the image).
#   - It builds ONLY on an explicit version tag or a manual run:
#       push a tag vX.Y.Z      -> image :X.Y.Z + :latest, and a GitHub Release
#       "Run workflow" (manual) -> image :edge, no Release
#   - concurrency cancels an older in-flight build for the same ref.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    name: Build & push base image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d ' \n' < VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag $GITHUB_REF_NAME ($tag) != VERSION file ($file)"; exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qmt-mcp
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: appliance
          file: appliance/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: image
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            QMT-MCP appliance ${{ github.ref_name }}.
            Image: `ghcr.io/${{ github.repository_owner }}/qmt-mcp:${{ github.ref_name }}`
            See CHANGELOG.md for details.

  cli:
    name: Build qmtctl binaries (if present)
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: cli/qmtctl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/qmtctl/go.mod
      - name: Cross-compile qmtctl
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            out="dist/qmtctl-${os}-${arch}${ext}"
            echo "building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -o "$out" .
          done
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/qmtctl/dist/*
