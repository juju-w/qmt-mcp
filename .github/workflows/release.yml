name: Release

# Triggered by a version tag (e.g. v0.1.0). Builds and publishes the amd64 base
# image to GHCR and creates a GitHub Release. The appliance is amd64-only by
# design (Apple Silicon is emulation-only), so no multi-arch image is built.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

jobs:
  image:
    name: Build & push base image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d ' \n' < VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag $GITHUB_REF_NAME ($tag) != VERSION file ($file)"; exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qmt-appliance-base
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: appliance
          file: appliance/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            QMT-MCP appliance ${{ github.ref_name }}.
            Image: `ghcr.io/${{ github.repository_owner }}/qmt-appliance-base:${{ github.ref_name }}`
            See CHANGELOG.md for details.

  cli:
    name: Build qmtctl binaries (if present)
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - name: Detect Go module
        id: detect
        run: |
          mod="$(find . -name go.mod -not -path './*/vendor/*' -print -quit)"
          if [ -n "$mod" ]; then
            echo "dir=$(dirname "$mod")" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet (qmtctl/007 not built) — skipping CLI release."
          fi
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.found == 'true'
        with:
          go-version: "1.22"
      - name: Cross-compile qmtctl
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            out="dist/qmtctl-${os}-${arch}${ext}"
            echo "building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -o "$out" ./...
          done
      - name: Attach binaries to release
        if: steps.detect.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.detect.outputs.dir }}/dist/*
