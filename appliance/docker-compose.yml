services:
  qmt:
    build: .
    image: qmt-appliance-base:local
    container_name: "qmt-${INSTANCE:-default}"
    platform: linux/amd64
    ports:
      - "${RDP_PORT:-13389}:3389"     # RDP
      - "${MCP_PORT:-18765}:8765"     # MCP (streamable-http, bearer-token)
    environment:
      RDP_SERVER: "yes"
      USER_NAME: "wineuser"
      USER_UID: "1000"
      USER_GID: "1000"
      QMT_RDP_PASSWORD: "${QMT_RDP_PASSWORD:-qmt}"
      TZ: "Asia/Shanghai"
      WINEARCH: "wow64"
      WINEPREFIX: "/home/wineuser/.wine"
      BROKER_MOUNT: "/broker"
      # read-only QMT MCP (bearer token required; set in .env)
      QMT_MCP_TOKEN: "${QMT_MCP_TOKEN:?set QMT_MCP_TOKEN in appliance/.env}"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      # optional PostgreSQL persistence (012); empty = off. For the bundled `db`
      # service below use e.g. postgresql://qmt:qmt@db:5432/qmt
      QMT_DB_URL: "${QMT_DB_URL:-}"
      # optional read-only account queries (004); off by default. Enable with
      # QMT_ENABLE_XTTRADE_QUERY=1 and QMT_TRADE_ACCOUNTS=<csv account ids>.
      QMT_ENABLE_XTTRADE_QUERY: "${QMT_ENABLE_XTTRADE_QUERY:-0}"
      QMT_TRADE_ACCOUNTS: "${QMT_TRADE_ACCOUNTS:-}"
    volumes:
      # The broker pack: extracted QMT terminal + matching xtquant + broker.yaml.
      # Mounted READ-WRITE (the terminal persists userdata/logs/config in-tree).
      # Switch brokers by pointing BROKER_PACK at another pack — no rebuild.
      - "${BROKER_PACK:?set BROKER_PACK in appliance/.env to a broker pack dir}:/broker"
    shm_size: "1g"
    restart: unless-stopped
    # Reflects MCP liveness via /livez. Reports unhealthy until an operator logs in
    # over RDP (the MCP autostarts with the desktop session); healthy once serving.
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Optional bundled PostgreSQL (012) for market-data warehousing. Behind a profile
  # so plain `docker compose up` starts NO database. To use it:
  #   docker compose --profile db up -d
  # and set in .env:  QMT_DB_URL=postgresql://qmt:qmt@db:5432/qmt
  db:
    image: postgres:16
    container_name: "qmt-${INSTANCE:-default}-db"
    profiles: ["db"]
    environment:
      POSTGRES_USER: "${QMT_DB_USER:-qmt}"
      POSTGRES_PASSWORD: "${QMT_DB_PASSWORD:-qmt}"
      POSTGRES_DB: "${QMT_DB_NAME:-qmt}"
    volumes:
      - "qmt-pgdata:/var/lib/postgresql/data"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QMT_DB_USER:-qmt} -d ${QMT_DB_NAME:-qmt}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qmt-pgdata:

# Multiple brokers on one host: copy appliance/.env per instance (distinct
# INSTANCE / RDP_PORT / MCP_PORT / QMT_MCP_TOKEN / BROKER_PACK) and run with
# `docker compose --env-file <file> -p <project> up -d`.
