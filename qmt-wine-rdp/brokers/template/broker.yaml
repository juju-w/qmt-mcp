# Broker pack contract (schema v1). Drop this at the root of a broker pack to
# tell the broker-agnostic base image how to drive the terminal. EVERY field is
# optional — anything omitted is auto-detected by scanning the mounted pack.
# Switching brokers = swap the mounted pack (+ this file). The image never changes.
#
# Full contract: specs/001-broker-pack-base/contracts/broker.yaml.schema.md

schema_version: 1                 # REQUIRED if this file exists; must be 1

broker:
  id: example-broker              # slug [a-z0-9-]+ ; default = pack dir name
  name: 示例券商 QMT               # display name (optional)

terminal:
  # relative to the pack root (/broker). Omit to auto-detect among known names
  # (XtItClient.exe, XtMiniQmt.exe).
  client: bin.x64/XtItClient.exe
  # userdata_mini dir (created on first login). Omit to auto-detect.
  userdata: userdata_mini

xtquant:
  # The xtquant package dir (must contain __init__.py), or its parent.
  # Omit to auto-detect. xtquant is ALWAYS provided by the pack (never the base).
  path: xtquant

mcp:
  mode: readonly                  # readonly (default) | trade  (trade deferred)
# Bearer token comes from the QMT_MCP_TOKEN env (deploy .env), never from here.
